    <radialGradient id="darkGlow" cx="50%" cy="25%" r="80%"><stop offset="0%" stop-color="#12345c"/><stop offset="65%" stop-color="#07111f"/><stop offset="100%" stop-color="#020617"/></radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="#f8fafc"/><text id="title" x="800" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="800" fill="#0b1326">ACRO Policy Engine Overview</text>
  <text id="desc" x="800" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" fill="#475569">Centralized policy management and evaluation for safe, consistent, and auditable response decisions</text><g filter="url(#shadow)">
    <rect x="40" y="140" width="240" height="270" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><circle cx="160" cy="118" r="18" fill="#2563eb"/><text x="160" y="125" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">1</text><text x="62" y="174" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#2563eb">POLICY AUTHORING</text><circle cx="66" cy="203" r="2.5" fill="#334155"/><text x="82" y="208" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Create and version policies</text><circle cx="66" cy="226" r="2.5" fill="#334155"/><text x="82" y="231" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Define conditions, rules,</text><text x="64" y="254" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">and actions</text><circle cx="66" cy="272" r="2.5" fill="#334155"/><text x="82" y="277" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Support OPA/Rego</text><circle cx="66" cy="295" r="2.5" fill="#334155"/><text x="82" y="300" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Test and validate policies</text></g><g filter="url(#shadow)">
    <rect x="300" y="140" width="240" height="270" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><circle cx="420" cy="118" r="18" fill="#16a34a"/><text x="420" y="125" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">2</text><text x="322" y="174" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#16a34a">POLICY STORE</text><circle cx="326" cy="203" r="2.5" fill="#334155"/><text x="342" y="208" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Central repository for</text><text x="324" y="231" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">all policies</text><circle cx="326" cy="249" r="2.5" fill="#334155"/><text x="342" y="254" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Version control and audit</text><text x="324" y="277" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">history</text><circle cx="326" cy="295" r="2.5" fill="#334155"/><text x="342" y="300" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Metadata and ownership</text><circle cx="326" cy="318" r="2.5" fill="#334155"/><text x="342" y="323" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">RBAC-protected access</text></g><g filter="url(#shadow)">
    <rect x="560" y="140" width="240" height="270" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><circle cx="680" cy="118" r="18" fill="#7c3aed"/><text x="680" y="125" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">3</text><text x="582" y="174" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#7c3aed">POLICY INGESTION</text><circle cx="586" cy="203" r="2.5" fill="#334155"/><text x="602" y="208" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Load and parse policies</text><circle cx="586" cy="226" r="2.5" fill="#334155"/><text x="602" y="231" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Validate syntax and</text><text x="584" y="254" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">structure</text><circle cx="586" cy="272" r="2.5" fill="#334155"/><text x="602" y="277" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Resolve dependencies</text><text x="584" y="300" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">and data sources</text><circle cx="586" cy="318" r="2.5" fill="#334155"/><text x="602" y="323" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Compile for evaluation</text></g><g filter="url(#shadow)">
    <rect x="820" y="140" width="240" height="270" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><circle cx="940" cy="118" r="18" fill="#ea580c"/><text x="940" y="125" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">4</text><text x="842" y="174" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#ea580c">POLICY EVALUATION</text><circle cx="846" cy="203" r="2.5" fill="#334155"/><text x="862" y="208" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Evaluate against context</text><text x="844" y="231" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">and inputs</text><circle cx="846" cy="249" r="2.5" fill="#334155"/><text x="862" y="254" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Risk scoring and impact</text><text x="844" y="277" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">analysis</text><circle cx="846" cy="295" r="2.5" fill="#334155"/><text x="862" y="300" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Check guardrails and</text><text x="844" y="323" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">constraints</text><circle cx="846" cy="341" r="2.5" fill="#334155"/><text x="862" y="346" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Return decision</text></g><g filter="url(#shadow)">
    <rect x="1080" y="140" width="240" height="270" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><circle cx="1200" cy="118" r="18" fill="#dc2626"/><text x="1200" y="125" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">5</text><text x="1102" y="174" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#dc2626">DECISION OUTPUT</text><circle cx="1106" cy="203" r="2.5" fill="#334155"/><text x="1122" y="208" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Allow / Deny / Require</text><text x="1104" y="231" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Approval</text><circle cx="1106" cy="249" r="2.5" fill="#334155"/><text x="1122" y="254" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Recommended actions</text><text x="1104" y="277" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">and rationale</text><circle cx="1106" cy="295" r="2.5" fill="#334155"/><text x="1122" y="300" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Human approval routing</text><text x="1104" y="323" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">when required</text><circle cx="1106" cy="341" r="2.5" fill="#334155"/><text x="1122" y="346" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Decision metadata</text></g><g filter="url(#shadow)">
    <rect x="1340" y="140" width="240" height="270" rx="14" fill="#f0fdfa" stroke="#0f9992" stroke-width="3"/><circle cx="1460" cy="118" r="18" fill="#0f9992"/><text x="1460" y="125" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">6</text><text x="1362" y="174" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#0f9992">POLICY MONITORING</text><circle cx="1366" cy="203" r="2.5" fill="#334155"/><text x="1382" y="208" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Monitor policy performance</text><circle cx="1366" cy="226" r="2.5" fill="#334155"/><text x="1382" y="231" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Track hits, denies,</text><text x="1364" y="254" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">overrides</text><circle cx="1366" cy="272" r="2.5" fill="#334155"/><text x="1382" y="277" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Audit all evaluations</text><text x="1364" y="300" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">and decisions</text><circle cx="1366" cy="318" r="2.5" fill="#334155"/><text x="1382" y="323" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Continuous tuning</text></g><rect x="40" y="440" width="1520" height="330" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="60" y="474" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">POLICY EVALUATION FLOW</text><g filter="url(#shadow)">
    <rect x="60" y="485" width="210" height="170" rx="14" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="82" y="519" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#2563eb">INPUT CONTEXT</text><text x="84" y="553" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Incident Data</text><text x="84" y="576" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Entity Information</text><text x="84" y="599" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Environment State</text><text x="84" y="622" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Threat Intelligence</text><text x="84" y="645" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">User Context</text><text x="84" y="668" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Historical Data</text></g><path d="M 270 570 L 315 570" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="315" y="485" width="180" height="170" rx="14" fill="#fff" stroke="#102a63" stroke-width="3"/><text x="405" y="519" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#102a63">POLICY ENGINE</text><text x="405" y="553" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Evaluates policies</text><text x="405" y="576" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">against context</text><text x="405" y="599" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">using OPA/Rego</text></g><path d="M 495 570 L 540 570" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="540" y="485" width="250" height="170" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="562" y="519" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#7c3aed">EVALUATION STEPS</text><text x="564" y="553" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">1 Match Policies</text><text x="564" y="576" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">2 Evaluate Conditions</text><text x="564" y="599" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">3 Apply Guardrails</text><text x="564" y="622" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">4 Compute Decision</text></g><path d="M 790 570 L 835 570" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><rect x="835" y="480" width="470" height="180" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="855" y="514" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">DECISION OUTCOMES</text><g filter="url(#shadow)">
    <rect x="850" y="525" width="130" height="110" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><text x="915" y="559" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#16a34a">ALLOW</text><text x="915" y="593" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Auto-approved</text></g><g filter="url(#shadow)">
    <rect x="1000" y="525" width="140" height="110" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="1070" y="559" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#ea580c">REQUIRE APPROVAL</text><text x="1070" y="593" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" fill="#334155">Route to queue</text></g><g filter="url(#shadow)">
    <rect x="1160" y="525" width="130" height="110" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="1225" y="559" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#dc2626">DENY</text><text x="1225" y="593" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Action blocked</text></g><path d="M 1305 570 L 1350 570" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1350" y="485" width="190" height="170" rx="14" fill="#fff" stroke="#0f9992" stroke-width="3"/><text x="1372" y="519" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#0f9992">ACTIONS &amp; ENFORCEMENT</text><text x="1374" y="553" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Execute approved actions</text><text x="1374" y="576" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Human approval workflow</text><text x="1374" y="599" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Deny and block actions</text></g><rect x="380" y="690" width="840" height="60" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="400" y="724" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">POLICY FEEDBACK LOOP</text><text x="420" y="728" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Collect Outcomes        Analyze &amp; Improve        Update Policies</text><rect x="40" y="800" width="500" height="100" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="60" y="834" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">POLICY TYPES (EXAMPLES)</text><text x="70" y="860" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#0b1326">Access Control     Risk-Based     Scope Control     Compliance     Time-Based</text><rect x="565" y="800" width="520" height="100" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="585" y="834" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">ENFORCEMENT POINTS</text><text x="595" y="860" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#0b1326">SOAR / Response     APIs / Integrations     Network Controls     Endpoint Agents</text><rect x="1110" y="800" width="450" height="100" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="1130" y="834" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">KEY PRINCIPLES</text><text x="1140" y="850" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#0b1326">Policy First     Least Privilege     Human Oversight</text>
<text x="1140" y="870" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#0b1326">Transparency     Consistency</text><g><rect x="40" y="930" width="1010" height="56" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="62" y="965" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#0b1326">LEGEND</text><rect x="160" y="951" width="24" height="16" rx="4" fill="#2563eb"/><text x="194" y="965" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Policy Creation</text><rect x="310" y="951" width="24" height="16" rx="4" fill="#16a34a"/><text x="344" y="965" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Policy Management</text><rect x="460" y="951" width="24" height="16" rx="4" fill="#7c3aed"/><text x="494" y="965" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Policy Processing</text><rect x="610" y="951" width="24" height="16" rx="4" fill="#ea580c"/><text x="644" y="965" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Decision Making</text><rect x="760" y="951" width="24" height="16" rx="4" fill="#dc2626"/><text x="794" y="965" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Outcomes</text><rect x="910" y="951" width="24" height="16" rx="4" fill="#0f9992"/><text x="944" y="965" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Monitoring</text></g></svg>