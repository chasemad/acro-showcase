<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <radialGradient id="darkGlow" cx="50%" cy="25%" r="80%"><stop offset="0%" stop-color="#12345c"/><stop offset="65%" stop-color="#07111f"/><stop offset="100%" stop-color="#020617"/></radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="#f8fafc"/><text id="title" x="800" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="800" fill="#0b1326">ACRO Agent Decision Flow</text>
  <text id="desc" x="800" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" fill="#475569">AI-assisted multi-agent workflow for analyzing incidents and recommending safe actions</text><g filter="url(#shadow)">
    <rect x="50" y="165" width="235" height="260" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><circle cx="167.5" cy="143" r="18" fill="#2563eb"/><text x="167.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">1</text><text x="72" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#2563eb">Incident Ingestion</text><circle cx="76" cy="228" r="2.5" fill="#334155"/><text x="92" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Alerts, logs, and</text><text x="74" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">telemetry ingested</text><circle cx="76" cy="274" r="2.5" fill="#334155"/><text x="92" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Normalized and</text><text x="74" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">enriched events</text></g><g filter="url(#shadow)">
    <rect x="340" y="165" width="235" height="260" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><circle cx="457.5" cy="143" r="18" fill="#16a34a"/><text x="457.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">2</text><text x="362" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#16a34a">Detection Agent</text><circle cx="366" cy="228" r="2.5" fill="#334155"/><text x="382" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Apply detection rules</text><text x="364" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">(Sigma/YARA, ML)</text><circle cx="366" cy="274" r="2.5" fill="#334155"/><text x="382" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Identify suspicious</text><text x="364" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">patterns</text><circle cx="366" cy="320" r="2.5" fill="#334155"/><text x="382" y="325" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Map to MITRE ATT&amp;CK</text></g><g filter="url(#shadow)">
    <rect x="630" y="165" width="235" height="260" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><circle cx="747.5" cy="143" r="18" fill="#7c3aed"/><text x="747.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">3</text><text x="652" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#7c3aed">Triage Agent</text><circle cx="656" cy="228" r="2.5" fill="#334155"/><text x="672" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Correlate related</text><text x="654" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">alerts and entities</text><circle cx="656" cy="274" r="2.5" fill="#334155"/><text x="672" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Build incident</text><text x="654" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">timeline</text><circle cx="656" cy="320" r="2.5" fill="#334155"/><text x="672" y="325" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Assess severity</text><text x="654" y="348" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">and scope</text></g><g filter="url(#shadow)">
    <rect x="920" y="165" width="235" height="260" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><circle cx="1037.5" cy="143" r="18" fill="#ea580c"/><text x="1037.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">4</text><text x="942" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#ea580c">Response Recommendation Agent</text><circle cx="946" cy="228" r="2.5" fill="#334155"/><text x="962" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Analyze context and</text><text x="944" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">blast radius</text><circle cx="946" cy="274" r="2.5" fill="#334155"/><text x="962" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Generate safe response</text><text x="944" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">options</text><circle cx="946" cy="320" r="2.5" fill="#334155"/><text x="962" y="325" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Rank actions by risk</text><text x="944" y="348" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">and effectiveness</text></g><g filter="url(#shadow)">
    <rect x="1210" y="165" width="235" height="260" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><circle cx="1327.5" cy="143" r="18" fill="#dc2626"/><text x="1327.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">5</text><text x="1232" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#dc2626">Policy Evaluation Agent</text><circle cx="1236" cy="228" r="2.5" fill="#334155"/><text x="1252" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Evaluate against policies</text><text x="1234" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">(OPA / Rego)</text><circle cx="1236" cy="274" r="2.5" fill="#334155"/><text x="1252" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Check risk, scope,</text><text x="1234" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">approvals, and guardrails</text><circle cx="1236" cy="320" r="2.5" fill="#334155"/><text x="1252" y="325" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">Determine if action is</text><text x="1234" y="348" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" fill="#334155">allowed or needs approval</text></g><path d="M 285 295 L 340 295" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 575 295 L 630 295" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 865 295 L 920 295" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1155 295 L 1210 295" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1110" y="500" width="170" height="95" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><text x="1195" y="534" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#16a34a">Allowed</text><text x="1195" y="568" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Auto-approved</text><text x="1195" y="591" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">by policy</text></g><g filter="url(#shadow)">
    <rect x="1330" y="500" width="200" height="95" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="1430" y="534" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#dc2626">Requires Approval</text><text x="1430" y="568" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Route to human</text><text x="1430" y="591" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">approval queue</text></g><g filter="url(#shadow)">
    <rect x="1330" y="660" width="200" height="150" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="1430" y="694" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#dc2626">Human Review</text><text x="1430" y="728" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Review context, risk,</text><text x="1430" y="751" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">and recommendations</text><text x="1430" y="774" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155"></text><text x="1430" y="797" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Approve, reject,</text><text x="1430" y="820" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">or modify action</text></g><path d="M 1327.5 425 L 1195 500" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1327.5 425 L 1430 500" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1430 595 L 1430 660" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1530 735 L 1560 735" fill="none" stroke="#1e293b" stroke-width="3" stroke-dasharray="7 8" marker-end="url(#arrow)"/><path d="M 1560 735 L 1560 265" fill="none" stroke="#1e293b" stroke-width="3" stroke-dasharray="7 8" marker-end="url(#arrow)"/><path d="M 1560 265 L 1445 265" fill="none" stroke="#1e293b" stroke-width="3" stroke-dasharray="7 8" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="875" y="660" width="220" height="160" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><circle cx="985" cy="638" r="18" fill="#2563eb"/><text x="985" y="645" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">6</text><text x="897" y="694" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#2563eb">Action Execution</text><circle cx="901" cy="723" r="2.5" fill="#334155"/><text x="917" y="728" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Execute via SOAR</text><text x="899" y="751" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">playbooks / APIs</text><circle cx="901" cy="769" r="2.5" fill="#334155"/><text x="917" y="774" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Enforce least privilege</text><circle cx="901" cy="792" r="2.5" fill="#334155"/><text x="917" y="797" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Record all actions</text></g><g filter="url(#shadow)">
    <rect x="615" y="660" width="220" height="160" rx="14" fill="#f0fdfa" stroke="#0f9992" stroke-width="3"/><circle cx="725" cy="638" r="18" fill="#0f9992"/><text x="725" y="645" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">7</text><text x="637" y="694" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#0f9992">Verification Agent</text><circle cx="641" cy="723" r="2.5" fill="#334155"/><text x="657" y="728" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Validate action success</text><circle cx="641" cy="746" r="2.5" fill="#334155"/><text x="657" y="751" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Monitor changes</text><circle cx="641" cy="769" r="2.5" fill="#334155"/><text x="657" y="774" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Detect unexpected</text><text x="639" y="797" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">behavior</text><circle cx="641" cy="815" r="2.5" fill="#334155"/><text x="657" y="820" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Confirm containment</text></g><g filter="url(#shadow)">
    <rect x="355" y="660" width="220" height="160" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="3"/><circle cx="465" cy="638" r="18" fill="#d97706"/><text x="465" y="645" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">8</text><text x="377" y="694" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#d97706">Incident Workspace Update</text><circle cx="381" cy="723" r="2.5" fill="#334155"/><text x="397" y="728" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Update case status</text><circle cx="381" cy="746" r="2.5" fill="#334155"/><text x="397" y="751" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Add new evidence</text><circle cx="381" cy="769" r="2.5" fill="#334155"/><text x="397" y="774" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Recalculate severity</text><text x="379" y="797" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">and scope</text></g><g filter="url(#shadow)">
    <rect x="50" y="660" width="220" height="160" rx="14" fill="#f8fafc" stroke="#102a63" stroke-width="3"/><circle cx="160" cy="638" r="18" fill="#102a63"/><text x="160" y="645" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">9</text><text x="72" y="694" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#102a63">Report / Summary Agent</text><circle cx="76" cy="723" r="2.5" fill="#334155"/><text x="92" y="728" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Generate summary</text><circle cx="76" cy="746" r="2.5" fill="#334155"/><text x="92" y="751" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Key findings and actions</text><circle cx="76" cy="769" r="2.5" fill="#334155"/><text x="92" y="774" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Lessons learned</text><circle cx="76" cy="792" r="2.5" fill="#334155"/><text x="92" y="797" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Share with stakeholders</text></g><path d="M 1195 595 L 985 660" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 875 740 L 835 740" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 615 740 L 575 740" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 355 740 L 320 740" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><rect x="30" y="860" width="1540" height="110" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="55" y="890" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700" fill="#0b1326">Legend (Agent Types)</text><g><rect x="40" y="910" width="1160" height="56" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="62" y="945" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#0b1326">LEGEND</text><rect x="160" y="931" width="24" height="16" rx="4" fill="#16a34a"/><text x="194" y="945" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Detection</text><rect x="310" y="931" width="24" height="16" rx="4" fill="#7c3aed"/><text x="344" y="945" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Triage / Analysis</text><rect x="460" y="931" width="24" height="16" rx="4" fill="#ea580c"/><text x="494" y="945" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Recommendation</text><rect x="610" y="931" width="24" height="16" rx="4" fill="#dc2626"/><text x="644" y="945" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Policy / Governance</text><rect x="760" y="931" width="24" height="16" rx="4" fill="#2563eb"/><text x="794" y="945" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Response / Execution</text><rect x="910" y="931" width="24" height="16" rx="4" fill="#0f9992"/><text x="944" y="945" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Verification</text><rect x="1060" y="931" width="24" height="16" rx="4" fill="#d97706"/><text x="1094" y="945" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Reporting / Output</text></g><text x="620" y="890" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#0b1326">Key Principles</text>
<text x="620" y="910" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#0b1326">AI assists, policies govern</text>
<text x="620" y="930" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#0b1326">Least privilege execution</text>
<text x="620" y="950" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#0b1326">Human oversight when required</text>
<text x="620" y="970" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#0b1326">Immutable audit of every action</text></svg>