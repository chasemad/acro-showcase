<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1280" viewBox="0 0 1920 1280" role="img" aria-labelledby="title desc">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <radialGradient id="darkGlow" cx="50%" cy="25%" r="80%"><stop offset="0%" stop-color="#12345c"/><stop offset="65%" stop-color="#07111f"/><stop offset="100%" stop-color="#020617"/></radialGradient>
  </defs>
  <rect width="1920" height="1280" fill="#f8fafc"/><text id="title" x="960" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="800" fill="#0b1326">ACRO Investigation Workspace Flow</text>
  <text id="desc" x="960" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" fill="#475569">How analysts pivot through incidents, evidence, entities, timelines, and AI-assisted investigation context</text><g filter="url(#shadow)">
    <rect x="75" y="250" width="260" height="180" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="97" y="284" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#2563eb">Incident Queue</text><text x="99" y="318" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Prioritized incidents arrive</text><text x="99" y="341" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">with severity, confidence, and</text><text x="99" y="364" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">linked evidence.</text></g><path d="M 335 345 L 390 345" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="390" y="250" width="260" height="180" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><text x="412" y="284" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#16a34a">Timeline View</text><text x="414" y="318" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Analysts reconstruct the attack</text><text x="414" y="341" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">timeline and related activity.</text></g><path d="M 650 345 L 705 345" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="705" y="250" width="260" height="180" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><text x="727" y="284" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#7c3aed">Entity Graph</text><text x="729" y="318" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Pivot across users, hosts, IPs,</text><text x="729" y="341" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">cloud assets, and service</text><text x="729" y="364" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">accounts.</text></g><path d="M 965 345 L 1020 345" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1020" y="250" width="260" height="180" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="1042" y="284" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#ea580c">Evidence Drawer</text><text x="1044" y="318" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Review logs, detections,</text><text x="1044" y="341" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">screenshots, files, and</text><text x="1044" y="364" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">supporting artifacts.</text></g><path d="M 1280 345 L 1335 345" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1335" y="250" width="260" height="180" rx="14" fill="#f0fdfa" stroke="#0f9992" stroke-width="3"/><text x="1357" y="284" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#0f9992">AI Summary</text><text x="1359" y="318" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">AI-assisted triage summarizes</text><text x="1359" y="341" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">findings, suspicious patterns,</text><text x="1359" y="364" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">and likely scope.</text></g><path d="M 1595 345 L 1650 345" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1650" y="250" width="260" height="180" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="1672" y="284" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#dc2626">Recommended Actions</text><text x="1674" y="318" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Suggested containment,</text><text x="1674" y="341" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">rollback, escalation, or</text><text x="1674" y="364" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">monitoring steps.</text></g><rect x="65" y="530" width="1790" height="300" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="85" y="564" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">Analyst Investigation Pivots</text><g filter="url(#shadow)">
    <rect x="100" y="630" width="390" height="150" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="295" y="664" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#2563eb">Identity Activity</text><text x="295" y="698" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">Authentication history, MFA events, role</text><text x="295" y="721" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">changes, and session anomalies.</text></g><path d="M 490 705 L 555 705" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="555" y="630" width="390" height="150" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><text x="750" y="664" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#16a34a">Cloud Resource Access</text><text x="750" y="698" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">Suspicious access to storage, secrets,</text><text x="750" y="721" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">compute, or administrative APIs.</text></g><path d="M 945 705 L 1010 705" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1010" y="630" width="390" height="150" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><text x="1205" y="664" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#7c3aed">Lateral Movement</text><text x="1205" y="698" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">Connections between hosts, users,</text><text x="1205" y="721" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">services, and privileged sessions.</text></g><path d="M 1400 705 L 1465 705" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1465" y="630" width="390" height="150" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="1660" y="664" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#ea580c">Threat Context</text><text x="1660" y="698" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">Threat intel, reputation, ATT&amp;CK</text><text x="1660" y="721" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">mappings, and prior related detections.</text></g><rect x="295" y="955" width="1330" height="230" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="315" y="989" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">Example Analyst Workflow</text><text x="365" y="1020" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">1. Analyst opens a high-severity cloud identity incident.</text>
<text x="365" y="1054" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">2. Timeline view reveals suspicious MFA activity followed by privileged API usage.</text>
<text x="365" y="1088" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">3. Entity graph links the same identity to multiple cloud resources and endpoints.</text>
<text x="365" y="1122" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">4. Evidence drawer confirms sensitive storage access from a previously unseen IP.</text>
<text x="365" y="1156" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">5. AI summary recommends temporary credential revocation and escalation.</text>
<text x="365" y="1190" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">6. Analyst approves scoped containment and preserves evidence references.</text><text x="960" y="1245" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500" fill="#475569">Recruiter view: demonstrates SOC investigation workflows, evidence handling, analyst pivots, and AI-assisted triage reasoning.</text></svg>