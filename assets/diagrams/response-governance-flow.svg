<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <radialGradient id="darkGlow" cx="50%" cy="25%" r="80%"><stop offset="0%" stop-color="#12345c"/><stop offset="65%" stop-color="#07111f"/><stop offset="100%" stop-color="#020617"/></radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="#f8fafc"/><text id="title" x="800" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="800" fill="#0b1326">ACRO Response Governance Flow</text>
  <text id="desc" x="800" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" fill="#475569">Policy-governed workflow ensuring safe, approved, and auditable cyber response actions</text><g filter="url(#shadow)">
    <rect x="40" y="165" width="195" height="295" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><circle cx="137.5" cy="143" r="18" fill="#2563eb"/><text x="137.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">1</text><text x="137.5" y="199" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#2563eb">1. SUGGEST</text><text x="137.5" y="233" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Agent generates</text><text x="137.5" y="256" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">response options</text><text x="137.5" y="279" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">based on context</text><text x="137.5" y="302" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">and analysis.</text></g><g filter="url(#shadow)">
    <rect x="270" y="165" width="195" height="295" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><circle cx="367.5" cy="143" r="18" fill="#16a34a"/><text x="367.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">2</text><text x="292" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#16a34a">2. SIMULATE</text><circle cx="296" cy="228" r="2.5" fill="#334155"/><text x="312" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Simulate impact</text><circle cx="296" cy="251" r="2.5" fill="#334155"/><text x="312" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Validate pre-conditions</text><circle cx="296" cy="274" r="2.5" fill="#334155"/><text x="312" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Estimate blast radius</text><circle cx="296" cy="297" r="2.5" fill="#334155"/><text x="312" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Identify dependencies</text></g><g filter="url(#shadow)">
    <rect x="500" y="165" width="195" height="295" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><circle cx="597.5" cy="143" r="18" fill="#7c3aed"/><text x="597.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">3</text><text x="522" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#7c3aed">3. POLICY CHECK</text><circle cx="526" cy="228" r="2.5" fill="#334155"/><text x="542" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Evaluate with OPA / Rego</text><circle cx="526" cy="251" r="2.5" fill="#334155"/><text x="542" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Check risk score</text><circle cx="526" cy="274" r="2.5" fill="#334155"/><text x="542" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Verify guardrails</text><circle cx="526" cy="297" r="2.5" fill="#334155"/><text x="542" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Confirm rollback plan</text><circle cx="526" cy="320" r="2.5" fill="#334155"/><text x="542" y="325" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Validate evidence refs</text></g><g filter="url(#shadow)">
    <rect x="730" y="165" width="195" height="295" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><circle cx="827.5" cy="143" r="18" fill="#ea580c"/><text x="827.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">4</text><text x="752" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#ea580c">4. APPROVE</text><circle cx="756" cy="228" r="2.5" fill="#334155"/><text x="772" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Auto-approve low risk</text><text x="754" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">if policy allows</text><circle cx="756" cy="274" r="2.5" fill="#334155"/><text x="772" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Or route to human</text><text x="754" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">approval queue</text><circle cx="756" cy="320" r="2.5" fill="#334155"/><text x="772" y="325" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Reviewer evaluates</text><text x="754" y="348" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">context and risk</text></g><g filter="url(#shadow)">
    <rect x="960" y="165" width="195" height="295" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><circle cx="1057.5" cy="143" r="18" fill="#dc2626"/><text x="1057.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">5</text><text x="982" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#dc2626">5. EXECUTE</text><circle cx="986" cy="228" r="2.5" fill="#334155"/><text x="1002" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Execute via SOAR</text><text x="984" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">playbooks / APIs</text><circle cx="986" cy="274" r="2.5" fill="#334155"/><text x="1002" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Enforce least privilege</text><circle cx="986" cy="297" r="2.5" fill="#334155"/><text x="1002" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Record all actions</text><circle cx="986" cy="320" r="2.5" fill="#334155"/><text x="1002" y="325" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Real-time updates</text></g><g filter="url(#shadow)">
    <rect x="1190" y="165" width="195" height="295" rx="14" fill="#f0fdfa" stroke="#0f9992" stroke-width="3"/><circle cx="1287.5" cy="143" r="18" fill="#0f9992"/><text x="1287.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">6</text><text x="1212" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#0f9992">6. VERIFY</text><circle cx="1216" cy="228" r="2.5" fill="#334155"/><text x="1232" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Validate action success</text><circle cx="1216" cy="251" r="2.5" fill="#334155"/><text x="1232" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Monitor for changes</text><circle cx="1216" cy="274" r="2.5" fill="#334155"/><text x="1232" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Confirm containment</text><circle cx="1216" cy="297" r="2.5" fill="#334155"/><text x="1232" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Detect unintended</text><text x="1214" y="325" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">consequences</text></g><g filter="url(#shadow)">
    <rect x="1420" y="165" width="195" height="295" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="3"/><circle cx="1517.5" cy="143" r="18" fill="#d97706"/><text x="1517.5" y="150" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">7</text><text x="1442" y="199" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="#d97706">7. ROLLBACK</text><circle cx="1446" cy="228" r="2.5" fill="#334155"/><text x="1462" y="233" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Auto-rollback if</text><text x="1444" y="256" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">verification fails</text><circle cx="1446" cy="274" r="2.5" fill="#334155"/><text x="1462" y="279" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Or manual rollback</text><text x="1444" y="302" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">if needed</text><circle cx="1446" cy="320" r="2.5" fill="#334155"/><text x="1462" y="325" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">Restore previous</text><text x="1444" y="348" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="15" fill="#334155">safe state</text></g><path d="M 235 285 L 270 285" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 465 285 L 500 285" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 695 285 L 730 285" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 925 285 L 960 285" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1155 285 L 1190 285" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1385 285 L 1420 285" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="390" y="535" width="200" height="95" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><text x="490" y="569" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#16a34a">POLICY ALLOWED</text><text x="490" y="603" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Within risk threshold</text><text x="490" y="626" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">and guardrails met</text></g><g filter="url(#shadow)">
    <rect x="625" y="535" width="230" height="95" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="740" y="569" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#dc2626">POLICY DENIED / HIGH RISK</text><text x="740" y="603" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Requires human approval</text><text x="740" y="626" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">or modifications</text></g><g filter="url(#shadow)">
    <rect x="605" y="655" width="300" height="95" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="755" y="689" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#dc2626">HUMAN APPROVAL QUEUE</text><text x="755" y="723" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Reviewer assesses risk, scope,</text><text x="755" y="746" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">evidence, and business impact.</text><text x="755" y="769" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#334155">Approve, reject, or modify.</text></g><path d="M 527 460 L 490 535" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 757 460 L 740 535" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 740 630 L 740 655" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 905 700 L 1040 460" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><rect x="40" y="775" width="1520" height="90" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="60" y="809" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">8. AUDIT &amp; EVIDENCE (CONTINUOUS)</text><text x="180" y="820" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Immutable audit log</text>
<text x="180" y="840" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">All events, decisions, and actions recorded.</text><text x="455" y="820" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Evidence references</text>
<text x="455" y="840" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Link alerts, artifacts, and sources.</text><text x="730" y="820" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Policy decision record</text>
<text x="730" y="840" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Store evaluation inputs and outputs.</text><text x="1005" y="820" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Reviewer accountability</text>
<text x="1005" y="840" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Who approved what, when, and why.</text><text x="1280" y="820" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Tamper-evident storage</text>
<text x="1280" y="840" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Integrity-focused history.</text><rect x="40" y="885" width="1110" height="80" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="60" y="919" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">KEY PRINCIPLES</text><text x="85" y="940" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700" fill="#0b1326">Policy First     Human Oversight     Least Privilege     Verify &amp; Rollback     Audit Everything</text><g><rect x="1180" y="885" width="1160" height="56" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="1202" y="920" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#0b1326">LEGEND</text><rect x="1300" y="906" width="24" height="16" rx="4" fill="#2563eb"/><text x="1334" y="920" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Analysis</text><rect x="1450" y="906" width="24" height="16" rx="4" fill="#16a34a"/><text x="1484" y="920" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Simulation / Validation</text><rect x="1600" y="906" width="24" height="16" rx="4" fill="#7c3aed"/><text x="1634" y="920" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Policy</text><rect x="1750" y="906" width="24" height="16" rx="4" fill="#dc2626"/><text x="1784" y="920" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Execution</text><rect x="1900" y="906" width="24" height="16" rx="4" fill="#0f9992"/><text x="1934" y="920" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Verification</text><rect x="2050" y="906" width="24" height="16" rx="4" fill="#d97706"/><text x="2084" y="920" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Recovery</text><rect x="2200" y="906" width="24" height="16" rx="4" fill="#0b1326"/><text x="2234" y="920" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Audit</text></g></svg>