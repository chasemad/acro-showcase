<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1280" viewBox="0 0 1920 1280" role="img" aria-labelledby="title desc">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <radialGradient id="darkGlow" cx="50%" cy="25%" r="80%"><stop offset="0%" stop-color="#12345c"/><stop offset="65%" stop-color="#07111f"/><stop offset="100%" stop-color="#020617"/></radialGradient>
  </defs>
  <rect width="1920" height="1280" fill="#f8fafc"/><text id="title" x="960" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="800" fill="#0b1326">ACRO Audit Trail &amp; Evidence Chain</text>
  <text id="desc" x="960" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" fill="#475569">Evidence-backed governance, approvals, rollback safety, and immutable response history</text><g filter="url(#shadow)">
    <rect x="60" y="275" width="275" height="205" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="82" y="309" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#2563eb">Detection Event</text><text x="84" y="343" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">Detection created from</text><text x="84" y="366" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">correlated telemetry with</text><text x="84" y="389" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">linked evidence references.</text></g><path d="M 335 380 L 383 380" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="383" y="275" width="275" height="205" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><text x="405" y="309" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#7c3aed">Response Proposal</text><text x="407" y="343" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">AI-assisted recommendation</text><text x="407" y="366" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">includes rationale, scope,</text><text x="407" y="389" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">confidence, and rollback plan.</text></g><path d="M 658 380 L 706 380" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="706" y="275" width="275" height="205" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="728" y="309" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#ea580c">Policy Evaluation</text><text x="730" y="343" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">OPA / Rego validates tenant</text><text x="730" y="366" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">rules, risk thresholds, and</text><text x="730" y="389" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">required approvals.</text></g><path d="M 981 380 L 1029 380" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1029" y="275" width="275" height="205" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><text x="1051" y="309" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#16a34a">Approval Decision</text><text x="1053" y="343" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">Human reviewer approves,</text><text x="1053" y="366" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">denies, or modifies the</text><text x="1053" y="389" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">proposed action.</text></g><path d="M 1304 380 L 1352 380" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1352" y="275" width="275" height="205" rx="14" fill="#f0fdfa" stroke="#0f9992" stroke-width="3"/><text x="1374" y="309" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#0f9992">Controlled Execution</text><text x="1376" y="343" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">SOAR executes only approved</text><text x="1376" y="366" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">actions against scoped targets.</text></g><path d="M 1627 380 L 1675 380" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1675" y="275" width="275" height="205" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="1697" y="309" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#dc2626">Immutable Receipt</text><text x="1699" y="343" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">All actions, approvals,</text><text x="1699" y="366" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">evidence, and results are</text><text x="1699" y="389" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" fill="#334155">written to audit history.</text></g><rect x="60" y="600" width="1800" height="260" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="80" y="634" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">Evidence Chain Components</text><g filter="url(#shadow)">
    <rect x="95" y="695" width="420" height="150" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="117" y="729" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#2563eb">Evidence References</text><text x="119" y="763" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Every proposal links to detections, raw</text><text x="119" y="786" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">telemetry, entities, and supporting</text><text x="119" y="809" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">artifacts.</text></g><path d="M 515 770 L 550 770" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="550" y="695" width="420" height="150" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><text x="572" y="729" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#16a34a">Rollback Metadata</text><text x="574" y="763" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Execution includes rollback instructions,</text><text x="574" y="786" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">restoration steps, and verification</text><text x="574" y="809" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">criteria.</text></g><path d="M 970 770 L 1005 770" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1005" y="695" width="420" height="150" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><text x="1027" y="729" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#7c3aed">Reviewer Accountability</text><text x="1029" y="763" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Approval records include reviewer identity,</text><text x="1029" y="786" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">timestamp, decision, and notes.</text></g><path d="M 1425 770 L 1460 770" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1460" y="695" width="420" height="150" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="1482" y="729" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#ea580c">Execution Outcome</text><text x="1484" y="763" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Success, failure, partial execution, and</text><text x="1484" y="786" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">verification results are preserved.</text></g><rect x="390" y="960" width="1220" height="230" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="410" y="994" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">Example Immutable Audit Receipt</text><text x="445" y="1035" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">• Incident ID: INC-2026-00421</text>
<text x="445" y="1069" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">• Proposed Action: Revoke privileged session</text>
<text x="445" y="1103" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">• Reviewer: analyst@example.test</text>
<text x="445" y="1137" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">• Policy Result: Approved (risk threshold satisfied)</text>
<text x="445" y="1171" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">• Evidence References: 14 linked artifacts</text>
<text x="445" y="1205" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">• Rollback Plan: Restore session + revert temporary blocks</text>
<text x="445" y="1239" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500" fill="#0b1326">• Execution Result: Successful</text><text x="960" y="1245" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500" fill="#475569">Recruiter view: demonstrates governance, accountability, rollback safety, evidence traceability, and enterprise-grade audit design.</text></svg>