<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1280" viewBox="0 0 1920 1280" role="img" aria-labelledby="title desc">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <radialGradient id="darkGlow" cx="50%" cy="25%" r="80%"><stop offset="0%" stop-color="#12345c"/><stop offset="65%" stop-color="#07111f"/><stop offset="100%" stop-color="#020617"/></radialGradient>
  </defs>
  <rect width="1920" height="1280" fill="#f8fafc"/><text id="title" x="960" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="800" fill="#0b1326">ACRO Event Correlation Flow</text>
  <text id="desc" x="960" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" fill="#475569">Turning isolated security signals into prioritized, evidence-backed incidents</text><g filter="url(#shadow)">
    <rect x="55" y="230" width="250" height="345" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><circle cx="180" cy="208" r="18" fill="#2563eb"/><text x="180" y="215" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">1</text><text x="77" y="264" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#2563eb">Collect Events</text><circle cx="81" cy="293" r="2.5" fill="#334155"/><text x="97" y="298" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Endpoint, identity,</text><text x="79" y="321" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">cloud, and network</text><text x="79" y="344" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">events arrive from</text><text x="79" y="367" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">monitored sources</text><circle cx="81" cy="385" r="2.5" fill="#334155"/><text x="97" y="390" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Events are tagged</text><text x="79" y="413" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">with tenant, source,</text><text x="79" y="436" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">timestamp, metadata</text></g><g filter="url(#shadow)">
    <rect x="363" y="230" width="250" height="345" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><circle cx="488" cy="208" r="18" fill="#16a34a"/><text x="488" y="215" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">2</text><text x="385" y="264" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#16a34a">Normalize</text><circle cx="389" cy="293" r="2.5" fill="#334155"/><text x="405" y="298" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Map raw events into</text><text x="387" y="321" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">a consistent security</text><text x="387" y="344" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">event format</text><circle cx="389" cy="362" r="2.5" fill="#334155"/><text x="405" y="367" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Standardize users,</text><text x="387" y="390" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">assets, actions,</text><text x="387" y="413" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">results, and severity</text></g><g filter="url(#shadow)">
    <rect x="671" y="230" width="250" height="345" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><circle cx="796" cy="208" r="18" fill="#7c3aed"/><text x="796" y="215" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">3</text><text x="693" y="264" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#7c3aed">Enrich Context</text><circle cx="697" cy="293" r="2.5" fill="#334155"/><text x="713" y="298" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Add asset criticality,</text><text x="695" y="321" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">identity role, geo,</text><text x="695" y="344" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">reputation, and threat</text><text x="695" y="367" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">intelligence context</text><circle cx="697" cy="385" r="2.5" fill="#334155"/><text x="713" y="390" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Link related entities</text><text x="695" y="413" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">before detection runs</text></g><g filter="url(#shadow)">
    <rect x="979" y="230" width="250" height="345" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><circle cx="1104" cy="208" r="18" fill="#ea580c"/><text x="1104" y="215" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">4</text><text x="1001" y="264" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#ea580c">Detect Signals</text><circle cx="1005" cy="293" r="2.5" fill="#334155"/><text x="1021" y="298" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Apply Sigma-style</text><text x="1003" y="321" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">detections, anomaly</text><text x="1003" y="344" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">rules, and thresholds</text><circle cx="1005" cy="362" r="2.5" fill="#334155"/><text x="1021" y="367" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Map detections to</text><text x="1003" y="390" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">MITRE ATT&amp;CK techniques</text><text x="1003" y="413" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">and tactics</text></g><g filter="url(#shadow)">
    <rect x="1287" y="230" width="250" height="345" rx="14" fill="#f0fdfa" stroke="#0f9992" stroke-width="3"/><circle cx="1412" cy="208" r="18" fill="#0f9992"/><text x="1412" y="215" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">5</text><text x="1309" y="264" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#0f9992">Correlate</text><circle cx="1313" cy="293" r="2.5" fill="#334155"/><text x="1329" y="298" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Group related signals</text><text x="1311" y="321" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">by user, host, IP,</text><text x="1311" y="344" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">cloud resource, and</text><text x="1311" y="367" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">time window</text><circle cx="1313" cy="385" r="2.5" fill="#334155"/><text x="1329" y="390" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Suppress noise and</text><text x="1311" y="413" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">identify multi-stage</text><text x="1311" y="436" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">attack patterns</text></g><g filter="url(#shadow)">
    <rect x="1595" y="230" width="250" height="345" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><circle cx="1720" cy="208" r="18" fill="#dc2626"/><text x="1720" y="215" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">6</text><text x="1617" y="264" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" fill="#dc2626">Prioritize Incident</text><circle cx="1621" cy="293" r="2.5" fill="#334155"/><text x="1637" y="298" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Score severity using</text><text x="1619" y="321" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">confidence, blast radius,</text><text x="1619" y="344" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">asset impact, and</text><text x="1619" y="367" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">evidence quality</text><circle cx="1621" cy="385" r="2.5" fill="#334155"/><text x="1637" y="390" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">Create analyst-ready</text><text x="1619" y="413" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">incident with evidence</text><text x="1619" y="436" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="22" fill="#334155">references</text></g><path d="M 305 400 L 363 400" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 613 400 L 671 400" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 921 400 L 979 400" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1229 400 L 1287 400" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1537 400 L 1595 400" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><rect x="55" y="650" width="1810" height="245" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="75" y="684" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">Correlation Logic</text><g filter="url(#shadow)">
    <rect x="95" y="720" width="320" height="130" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="117" y="754" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#2563eb">Entity Matching</text><text x="119" y="788" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">Connect alerts by shared users,</text><text x="119" y="811" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">devices, IP addresses, cloud</text><text x="119" y="834" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">resources, and service accounts.</text></g><path d="M 415 785 L 460 785" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="460" y="720" width="320" height="130" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><text x="482" y="754" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#16a34a">Time Windows</text><text x="484" y="788" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">Group signals by short</text><text x="484" y="811" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">investigation windows to detect</text><text x="484" y="834" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">chained or staged activity.</text></g><path d="M 780 785 L 825 785" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="825" y="720" width="320" height="130" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><text x="847" y="754" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#7c3aed">Attack Patterning</text><text x="849" y="788" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">Recognize sequences such as login</text><text x="849" y="811" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">anomaly → privilege change →</text><text x="849" y="834" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">resource access.</text></g><path d="M 1145 785 L 1190 785" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1190" y="720" width="320" height="130" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="1212" y="754" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#ea580c">Noise Reduction</text><text x="1214" y="788" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">Suppress known-good behavior,</text><text x="1214" y="811" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">duplicate alerts, and expected</text><text x="1214" y="834" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">administrative activity.</text></g><path d="M 1510 785 L 1555 785" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1555" y="720" width="320" height="130" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="1577" y="754" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#dc2626">Incident Decision</text><text x="1579" y="788" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">Promote correlated evidence into</text><text x="1579" y="811" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">an incident when risk and</text><text x="1579" y="834" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="19" fill="#334155">confidence pass thresholds.</text></g><rect x="55" y="935" width="1810" height="205" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="75" y="969" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">Example Correlation Scenario</text><g filter="url(#shadow)">
    <rect x="105" y="1015" width="310" height="90" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="127" y="1049" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="800" fill="#2563eb">1. Impossible Login</text><text x="129" y="1083" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">Admin account logs in from an</text><text x="129" y="1106" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">unusual country.</text></g><path d="M 415 1060 L 460 1060" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="460" y="1015" width="310" height="90" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="482" y="1049" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="800" fill="#ea580c">2. MFA Fatigue</text><text x="484" y="1083" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">Multiple push attempts appear before</text><text x="484" y="1106" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">successful login.</text></g><path d="M 770 1060 L 815 1060" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="815" y="1015" width="310" height="90" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><text x="837" y="1049" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="800" fill="#7c3aed">3. Privilege Change</text><text x="839" y="1083" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">Role or group membership changes</text><text x="839" y="1106" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">shortly after login.</text></g><path d="M 1125 1060 L 1170 1060" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1170" y="1015" width="310" height="90" rx="14" fill="#f0fdfa" stroke="#0f9992" stroke-width="3"/><text x="1192" y="1049" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="800" fill="#0f9992">4. Cloud Access</text><text x="1194" y="1083" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">Sensitive cloud resource is accessed</text><text x="1194" y="1106" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">by the same account.</text></g><path d="M 1480 1060 L 1525 1060" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)">
    <rect x="1525" y="1015" width="310" height="90" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="1547" y="1049" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="800" fill="#dc2626">5. Incident Created</text><text x="1549" y="1083" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">ACRO links the sequence and opens a</text><text x="1549" y="1106" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="20" fill="#334155">prioritized case.</text></g><text x="960" y="1225" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500" fill="#475569">Recruiter view: shows detection engineering, SIEM correlation, prioritization, and evidence-backed incident creation.</text></svg>