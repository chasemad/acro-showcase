    <radialGradient id="darkGlow" cx="50%" cy="25%" r="80%"><stop offset="0%" stop-color="#12345c"/><stop offset="65%" stop-color="#07111f"/><stop offset="100%" stop-color="#020617"/></radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="#f8fafc"/><text id="title" x="800" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="800" fill="#0b1326">ACRO Evidence Pipeline</text>
  <text id="desc" x="800" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" fill="#475569">Collect, normalize, enrich, store, and access high-integrity evidence for analysis and response</text><g filter="url(#shadow)">
    <rect x="30" y="145" width="215" height="385" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><circle cx="137.5" cy="123" r="18" fill="#2563eb"/><text x="137.5" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">1</text><text x="137.5" y="179" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#2563eb">COLLECT</text><text x="137.5" y="213" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Ingest raw data and</text><text x="137.5" y="236" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">artifacts from diverse</text><text x="137.5" y="259" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">sources.</text><text x="137.5" y="282" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155"></text><text x="137.5" y="305" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Endpoints</text><text x="137.5" y="328" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Identity Providers</text><text x="137.5" y="351" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Network Devices</text><text x="137.5" y="374" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Cloud Services</text><text x="137.5" y="397" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Applications</text><text x="137.5" y="420" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">External Feeds</text></g><g filter="url(#shadow)">
    <rect x="292" y="145" width="215" height="385" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><circle cx="399.5" cy="123" r="18" fill="#16a34a"/><text x="399.5" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">2</text><text x="399.5" y="179" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#16a34a">NORMALIZE</text><text x="399.5" y="213" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Standardize and structure</text><text x="399.5" y="236" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">events for consistent</text><text x="399.5" y="259" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">processing.</text><text x="399.5" y="282" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155"></text><text x="399.5" y="305" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Parse and standardize</text><text x="399.5" y="328" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">formats</text><text x="399.5" y="351" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Map to common schema</text><text x="399.5" y="374" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Deduplicate events</text></g><g filter="url(#shadow)">
    <rect x="554" y="145" width="215" height="385" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><circle cx="661.5" cy="123" r="18" fill="#7c3aed"/><text x="661.5" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">3</text><text x="661.5" y="179" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#7c3aed">ENRICH</text><text x="661.5" y="213" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Add contextual intelligence</text><text x="661.5" y="236" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">to improve correlation</text><text x="661.5" y="259" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">and analysis.</text><text x="661.5" y="282" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155"></text><text x="661.5" y="305" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Threat intelligence lookup</text><text x="661.5" y="328" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Asset and identity context</text><text x="661.5" y="351" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• GeoIP and reputation data</text><text x="661.5" y="374" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• MITRE ATT&amp;CK mapping</text></g><g filter="url(#shadow)">
    <rect x="816" y="145" width="215" height="385" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><circle cx="923.5" cy="123" r="18" fill="#ea580c"/><text x="923.5" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">4</text><text x="923.5" y="179" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#ea580c">STORE</text><text x="923.5" y="213" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Store evidence securely</text><text x="923.5" y="236" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">with integrity and</text><text x="923.5" y="259" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">traceability.</text><text x="923.5" y="282" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155"></text><text x="923.5" y="305" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Immutable storage</text><text x="923.5" y="328" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Cryptographic hashing</text><text x="923.5" y="351" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Tamper-evident records</text><text x="923.5" y="374" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Access control &amp; RBAC</text></g><g filter="url(#shadow)">
    <rect x="1078" y="145" width="215" height="385" rx="14" fill="#f0fdfa" stroke="#0f9992" stroke-width="3"/><circle cx="1185.5" cy="123" r="18" fill="#0f9992"/><text x="1185.5" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">5</text><text x="1185.5" y="179" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#0f9992">ACCESS</text><text x="1185.5" y="213" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Enable fast search</text><text x="1185.5" y="236" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">and retrieval for</text><text x="1185.5" y="259" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">investigation and response.</text><text x="1185.5" y="282" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155"></text><text x="1185.5" y="305" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Full-text and field search</text><text x="1185.5" y="328" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Time-range filtering</text><text x="1185.5" y="351" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Entity lookup</text><text x="1185.5" y="374" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Evidence timelines</text></g><g filter="url(#shadow)">
    <rect x="1340" y="145" width="215" height="385" rx="14" fill="#f8fafc" stroke="#102a63" stroke-width="3"/><circle cx="1447.5" cy="123" r="18" fill="#102a63"/><text x="1447.5" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">6</text><text x="1447.5" y="179" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#102a63">PRESERVE &amp; AUDIT</text><text x="1447.5" y="213" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Maintain chain of custody</text><text x="1447.5" y="236" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">and audit all interactions</text><text x="1447.5" y="259" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">with evidence.</text><text x="1447.5" y="282" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155"></text><text x="1447.5" y="305" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Chain of custody tracking</text><text x="1447.5" y="328" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Immutable audit logs</text><text x="1447.5" y="351" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Access logging</text><text x="1447.5" y="374" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Integrity verification</text></g><path d="M 245 255 L 292 255" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 507 255 L 554 255" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 769 255 L 816 255" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1031 255 L 1078 255" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1293 255 L 1340 255" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><rect x="30" y="550" width="1540" height="230" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="50" y="584" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">EVIDENCE STORAGE LAYER</text><g filter="url(#shadow)">
    <rect x="55" y="585" width="250" height="170" rx="14" fill="#fff" stroke="#16a34a" stroke-width="3"/><text x="77" y="619" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#16a34a">STORAGE TIERS</text><text x="79" y="653" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Hot Storage: recent evidence</text><text x="79" y="676" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Warm Storage: optimized retrieval</text><text x="79" y="699" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Cold Storage: long-term retention</text></g><g filter="url(#shadow)">
    <rect x="350" y="585" width="330" height="170" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="372" y="619" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#7c3aed">INTEGRITY &amp; CHAIN OF CUSTODY</text><text x="374" y="653" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Cryptographic hashing for records</text><text x="374" y="676" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Digital signatures and validation</text><text x="374" y="699" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Chain of custody tracking</text><text x="374" y="722" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Tamper-evident append-only logs</text></g><g filter="url(#shadow)">
    <rect x="720" y="585" width="450" height="170" rx="14" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="945" y="619" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#2563eb">DATA STORES</text><text x="945" y="653" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Event Store     Object Store     Graph Store     Index Store</text><text x="945" y="676" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155"></text><text x="945" y="699" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Indexed and linked for fast retrieval and correlation</text></g><g filter="url(#shadow)">
    <rect x="1210" y="585" width="330" height="170" rx="14" fill="#fff" stroke="#102a63" stroke-width="3"/><text x="1232" y="619" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#102a63">ACCESS CONTROLS</text><text x="1234" y="653" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Role-Based Access Control</text><text x="1234" y="676" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Data Classification</text><text x="1234" y="699" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Audit Logging</text><text x="1234" y="722" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Export Controls</text></g><rect x="30" y="800" width="1540" height="70" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="50" y="834" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">EVIDENCE PIPELINE OUTPUTS &amp; USES</text><text x="90" y="848" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700" fill="#0b1326">Incident Investigation      Threat Hunting      Detection Engineering      Compliance &amp; Legal      Reporting &amp; Metrics</text><rect x="30" y="890" width="420" height="80" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="50" y="924" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">DATA SOURCES EXAMPLES</text><text x="55" y="930" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#0b1326">Windows / Linux Endpoints     AWS / Azure / GCP</text>
<text x="55" y="947" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#0b1326">Active Directory / Entra ID     SaaS Applications</text>
<text x="55" y="964" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#0b1326">Firewalls / IDS / IPS     Vulnerability Scanners</text><rect x="470" y="890" width="860" height="80" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="490" y="924" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0b1326">KEY PRINCIPLES</text><text x="510" y="940" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0b1326">Integrity First     Security by Design     Context Matters     Retention &amp; Compliance     Traceability</text><g><rect x="1340" y="890" width="1010" height="56" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="1362" y="925" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#0b1326">LEGEND</text><rect x="1460" y="911" width="24" height="16" rx="4" fill="#2563eb"/><text x="1494" y="925" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Collection</text><rect x="1610" y="911" width="24" height="16" rx="4" fill="#16a34a"/><text x="1644" y="925" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Processing</text><rect x="1760" y="911" width="24" height="16" rx="4" fill="#7c3aed"/><text x="1794" y="925" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Enrichment</text><rect x="1910" y="911" width="24" height="16" rx="4" fill="#ea580c"/><text x="1944" y="925" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Storage</text><rect x="2060" y="911" width="24" height="16" rx="4" fill="#0f9992"/><text x="2094" y="925" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Access</text><rect x="2210" y="911" width="24" height="16" rx="4" fill="#102a63"/><text x="2244" y="925" font-family="Inter,Arial,sans-serif" font-size="15" fill="#0b1326">Governance</text></g></svg>