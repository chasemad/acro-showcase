  </defs>
  <rect width="1600" height="1000" fill="#f8fafc"/><text id="title" x="800" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="800" fill="#0b1326">ACRO Blast Radius Analysis Flow</text>
  <text id="desc" x="800" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" fill="#475569">Understanding impact by mapping relationships and dependencies across the environment</text><g filter="url(#shadow)">
    <rect x="50" y="145" width="210" height="310" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><circle cx="155" cy="123" r="18" fill="#2563eb"/><text x="155" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">1</text><text x="155" y="179" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#2563eb">INPUT: INCIDENT CONTEXT</text><text x="155" y="213" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Starting point(s)</text><text x="155" y="236" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• User, host, IP, account,</text><text x="155" y="259" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">or alert</text><text x="155" y="282" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Related indicators</text><text x="155" y="305" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">and entities</text><text x="155" y="328" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">• Initial severity and</text><text x="155" y="351" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">time window</text></g><g filter="url(#shadow)">
    <rect x="307" y="145" width="210" height="310" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/><circle cx="412" cy="123" r="18" fill="#16a34a"/><text x="412" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">2</text><text x="329" y="179" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#16a34a">ENTITY DISCOVERY</text><circle cx="333" cy="208" r="2.5" fill="#334155"/><text x="349" y="213" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Query identity, endpoint,</text><text x="331" y="236" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">network, cloud, and</text><text x="331" y="259" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">application data</text><circle cx="333" cy="277" r="2.5" fill="#334155"/><text x="349" y="282" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Resolve aliases and</text><text x="331" y="305" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">related indicators</text><circle cx="333" cy="323" r="2.5" fill="#334155"/><text x="349" y="328" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Enrich with asset and</text><text x="331" y="351" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">identity context</text></g><g filter="url(#shadow)">
    <rect x="564" y="145" width="210" height="310" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><circle cx="669" cy="123" r="18" fill="#7c3aed"/><text x="669" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">3</text><text x="586" y="179" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#7c3aed">RELATIONSHIP GRAPH CONSTRUCTION</text><circle cx="590" cy="208" r="2.5" fill="#334155"/><text x="606" y="213" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Build graph of entities</text><text x="588" y="236" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">and relationships</text><circle cx="590" cy="254" r="2.5" fill="#334155"/><text x="606" y="259" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Include trust, access,</text><text x="588" y="282" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">communication, and</text><text x="588" y="305" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">dependencies</text><circle cx="590" cy="323" r="2.5" fill="#334155"/><text x="606" y="328" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Weight edges by</text><text x="588" y="351" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">confidence and recency</text></g><g filter="url(#shadow)">
    <rect x="821" y="145" width="210" height="310" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><circle cx="926" cy="123" r="18" fill="#ea580c"/><text x="926" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">4</text><text x="843" y="179" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#ea580c">IMPACT PROPAGATION &amp; ANALYSIS</text><circle cx="847" cy="208" r="2.5" fill="#334155"/><text x="863" y="213" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Propagate impact</text><text x="845" y="236" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">across the graph</text><circle cx="847" cy="254" r="2.5" fill="#334155"/><text x="863" y="259" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Identify directly and</text><text x="845" y="282" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">indirectly affected</text><text x="845" y="305" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">entities</text><circle cx="847" cy="323" r="2.5" fill="#334155"/><text x="863" y="328" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Calculate risk scores</text><text x="845" y="351" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">per entity</text></g><g filter="url(#shadow)">
    <rect x="1078" y="145" width="210" height="310" rx="14" fill="#f0fdfa" stroke="#0f9992" stroke-width="3"/><circle cx="1183" cy="123" r="18" fill="#0f9992"/><text x="1183" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">5</text><text x="1100" y="179" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#0f9992">RISK SCORING</text><circle cx="1104" cy="208" r="2.5" fill="#334155"/><text x="1120" y="213" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Score based on:</text><text x="1102" y="236" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">criticality, exposure,</text><text x="1102" y="259" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">permissions, and</text><text x="1102" y="282" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">sensitivity</text><circle cx="1104" cy="300" r="2.5" fill="#334155"/><text x="1120" y="305" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Normalize and rank</text><text x="1102" y="328" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">impacted entities</text><circle cx="1104" cy="346" r="2.5" fill="#334155"/><text x="1120" y="351" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Highlight choke points</text></g><g filter="url(#shadow)">
    <rect x="1335" y="145" width="210" height="310" rx="14" fill="#f8fafc" stroke="#102a63" stroke-width="3"/><circle cx="1440" cy="123" r="18" fill="#102a63"/><text x="1440" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#fff">6</text><text x="1357" y="179" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#102a63">VISUALIZATION &amp; OUTPUT</text><circle cx="1361" cy="208" r="2.5" fill="#334155"/><text x="1377" y="213" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Visualize blast radius</text><text x="1359" y="236" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">graph</text><circle cx="1361" cy="254" r="2.5" fill="#334155"/><text x="1377" y="259" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Show affected entities</text><text x="1359" y="282" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">by risk level</text><circle cx="1361" cy="300" r="2.5" fill="#334155"/><text x="1377" y="305" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Export results for</text><text x="1359" y="328" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">reporting and response</text></g><path d="M 260 270 L 307 270" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 517 270 L 564 270" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 774 270 L 821 270" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1031 270 L 1078 270" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><path d="M 1288 270 L 1335 270" fill="none" stroke="#1e293b" stroke-width="5" marker-end="url(#arrow)"/><rect x="50" y="485" width="1500" height="270" rx="14" fill="#ffffff" 